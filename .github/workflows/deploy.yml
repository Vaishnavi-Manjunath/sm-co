name: Deploy to Namecheap

on:
  push:
    branches: [ main ]
  # Manual run — used for ROLLBACK. Enter a previous tag (e.g. release-20260620-1450-ab12cd3)
  # in "ref" to redeploy that exact version. Leave blank to redeploy the latest main.
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to deploy (blank = latest main). Use a release-* tag to roll back.'
        required: false
        default: ''

# Needed so the workflow can push the release tag back to the repo.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # On a manual run, deploy the ref the user typed; otherwise the pushed commit.
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Deploy Frontend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./frontend/dist/
          server-dir: /
          dangerous-clean-slate: true

      - name: Deploy Backend API via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./backend/api/
          server-dir: /api/
          dangerous-clean-slate: false

      - name: Deploy Backend Helpers via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./backend/helpers/
          server-dir: /helpers/
          dangerous-clean-slate: false

      - name: Deploy Backend Data via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./backend/data/
          server-dir: /data/
          dangerous-clean-slate: false

      # Tag every successful auto-deploy so you always have a named point to roll back to.
      # Skipped on manual rollback runs (so redeploying an old tag doesn't create new tags).
      - name: Tag this release
        if: github.event_name == 'push'
        run: |
          TAG="release-$(date -u +%Y%m%d-%H%M)-${GITHUB_SHA::7}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tagged live release: $TAG"
